<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>QA AutoFill Pro Settings</title>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;800&family=DM+Sans:wght@400;500&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="popup.css">
    <style>
        body {
            width: 100%;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--bg);
        }

        .container {
            width: 600px;
            padding: 40px;
            background: var(--surface);
            border-radius: 20px;
            border: 1px solid var(--border);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
        }

        h1 {
            font-family: 'Syne', sans-serif;
            margin-bottom: 20px;
            color: var(--text);
        }

        .profile-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: var(--surface2);
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 10px;
            border: 1px solid var(--border);
        }

        .profile-actions button {
            margin-left: 8px;
            padding: 6px 12px;
            font-size: 11px;
        }

        .add-new {
            margin-top: 20px;
            width: 100%;
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>⚙️ Profile Manager</h1>
        <div id="profiles-list"></div>
        <button id="btn-create" class="btn btn-primary add-new">+ Create Blank Profile</button>
        <div style="margin-top:40px; border-top: 1px solid var(--border); padding-top:20px; display:flex; gap:10px;">
            <button id="btn-export" class="btn btn-secondary">⬇️ Export JSON</button>
            <button id="btn-import" class="btn btn-secondary">⬆️ Import JSON</button>
            <input type="file" id="file-import" style="display:none" accept=".json">
        </div>
    </div>
    <script src="options.js"></script>
</body>

</html>
